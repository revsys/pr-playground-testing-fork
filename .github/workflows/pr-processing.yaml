name: PR Quality Checks

# SECURITY NOTE: pull_request_target runs in the context of the BASE branch,
# giving the workflow write access to the repo. We always checkout the default
# branch (never the PR head) so no untrusted code from the PR is executed.

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

concurrency:
  group: pr-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  pr-quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch (never the PR head)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run PR quality checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          # ----------------------------------------------------------------
          # Configurable: comma-separated list of acceptable Trac ticket
          # stage names. Valid values (derived from Trac CSV fields):
          #   "Needs Patch"      — accepted ticket, no patch submitted yet
          #   "Needs PR Review"  — patch exists, awaiting community review
          #   "Waiting on Author" — patch needs fixes from the author
          #   "Ready for Checkin" — approved, awaiting merger
          # ----------------------------------------------------------------
          ACCEPTABLE_STAGES: "Needs Patch,Needs PR Review,Waiting on Author"
        run: uv run python .github/workflows/pr-processing/check_pr.py
