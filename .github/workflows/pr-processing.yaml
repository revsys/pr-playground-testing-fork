name: PR Quality Checks

# SECURITY NOTE: pull_request_target runs in the context of the BASE branch,
# giving the workflow write access to the repo. We always checkout the default
# branch (never the PR head) so no untrusted code from the PR is executed.

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

concurrency:
  group: pr-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  pr-quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch (never the PR head)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Run PR quality checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python .github/workflows/pr-processing/check_pr.py
